version: 1

AppDir:
  path: ./AppDir

  app_info:
    id: io.github.weversonl.GnomeQuickShare
    name: GnomeQS
    icon: io.github.weversonl.GnomeQuickShare
    version: !ENV ${GNOMEQS_VERSION}
    exec: usr/bin/gnomeqs
    exec_args: $@

  apt:
    arch: amd64
    sources:
      - sourceline: !ENV "deb http://archive.ubuntu.com/ubuntu ${UBUNTU_CODENAME} main restricted universe multiverse"
        key_url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C
      - sourceline: !ENV "deb http://archive.ubuntu.com/ubuntu ${UBUNTU_CODENAME}-updates main restricted universe"

    include:
      # GTK4 + libadwaita
      - libgtk-4-1
      - libadwaita-1-0
      # GTK3 for tray helper
      - libgtk-3-0
      # Tray (AppIndicator)
      - libayatana-appindicator3-1
      - libayatana-indicator3-7
      # GLib / GIO / GSettings
      - libglib2.0-0
      - libglib2.0-bin
      # Icons and themes
      - adwaita-icon-theme
      - hicolor-icon-theme
      # GDK pixbuf loaders (PNG/SVG)
      - libgdk-pixbuf-2.0-0
      - gdk-pixbuf2-xlib
      - librsvg2-common
      # Wayland + X11 backends
      - libwayland-client0
      - libwayland-cursor0
      - libwayland-egl1
      - libx11-6
      - libxkbcommon0
      # D-Bus (GSettings, notifications)
      - libdbus-1-3
      # Pango / Cairo
      - libpango-1.0-0
      - libpangocairo-1.0-0
      - libcairo2
      - libcairo-gobject2

    exclude:
      - perl
      - perl-base
      - dpkg
      - debconf
      - libglib2.0-data

  files:
    exclude:
      - usr/share/doc
      - usr/share/man
      - usr/share/lintian
      - usr/share/locale
      - usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders/libpixbufloader-bmp.so
      - usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders/libpixbufloader-tiff.so

  runtime:
    env:
      APPDIR_LIBRARY_PATH: >-
        $APPDIR/usr/lib/x86_64-linux-gnu:
        $APPDIR/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders
      GDK_BACKEND: wayland,x11
      GTK_THEME: Adwaita
      XDG_DATA_DIRS: $APPDIR/usr/share:$XDG_DATA_DIRS
      GSETTINGS_SCHEMA_DIR: $APPDIR/usr/share/glib-2.0/schemas
      GDK_PIXBUF_MODULE_FILE: $APPDIR/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders.cache

AppImage:
  arch: x86_64
  update-information: gh-releases-zsync|weversonl|gnome-quick-share|latest|*-x86_64.AppImage.zsync
  sign-key: None
